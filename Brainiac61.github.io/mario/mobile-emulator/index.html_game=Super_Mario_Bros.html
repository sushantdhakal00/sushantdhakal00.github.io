<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta charset="utf-8">
  <style>

    html,
    body{
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      position: relative;
      touch-action: pan-x pan-y;
      overflow-x: hidden;
      overflow-y: hidden;
    }
    * {
        -webkit-touch-callout: none;
        -webkit-user-callout: none;
        -webkit-user-select: none;
        -webkit-user-drag: none;
        -webkit-user-modify: none;
        -webkit-highlight: none;
    } 
    * {
    margin: 0;
    padding: 0;
    border: 0;
}



#wrapper {
    height: 100%;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
}


  </style>

</head>

<body>
<div id = "wrapper">
    <div id="game" />
</div>

  <script type="text/javascript">
    document.body.addEventListener('touchstart', function(e){ e.preventDefault(); });
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const game = urlParams.get('game')
    EJS_player = "#game";
    EJS_biosUrl = 'disksys.rom'; // Url to Famicom Disk System bios
    EJS_gameUrl = "/download.php?game="+game;
    EJS_core = "nes";
    EJS_lightgun = false; // Lightgun
    EJS_pathtodata = "/jsemu/data/";
    EJS_AdUrl = '/ads.html'; //path to AD page
    EJS_startOnLoaded = true;
    setTimeout(function(){ 
      document.querySelectorAll("a[class*='ejs']")[0].click();
		 }, 3000);
</script>
<script src="../jsemu/data/loader.js"></script>



</body>

</html>
